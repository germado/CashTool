<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Proxy Formatter</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f8fafc;
  display: flex;
  justify-content: center;
  padding: 60px 20px;
}

.container {
  width: 100%;
  max-width: 720px;
  text-align: center;
}

h1 {
  font-size: 22px;
  font-weight: 500;
  color: #374151;
  margin-bottom: 25px;
}

/* TEXTAREA */
textarea {
  width: 100%;
  height: 180px;
  padding: 16px;
  border-radius: 14px;
  border: 1px solid #e5e7eb;
  background: white;
  font-size: 14px;
  resize: none;
  outline: none;
}

/* BUTTON */
.generate {
  margin-top: 15px;
  padding: 14px 28px;
  border-radius: 30px;
  border: none;
  background: #84cc16;
  color: white;
  font-weight: 500;
  cursor: pointer;
}

.generate:hover {
  background: #65a30d;
}

/* OUTPUT */
.output {
  margin-top: 35px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* CARD ROW */
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: white;
  border: 1px solid #e5e7eb;
  padding: 16px;
  border-radius: 14px;
  animation: fadeIn .4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* PROXY TEXT */
.proxy {
  font-size: 14px;
  font-weight: 500;
}

.host { color: #2563eb; }
.port { color: #ef4444; }
.user { color: #16a34a; }
.pass { color: #ca8a04; }

/* BUTTON */
.copy-btn {
  border: 1px solid #e5e7eb;
  background: #f9fafb;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
}

.copy-btn:hover {
  background: #f3f4f6;
}
</style>
</head>

<body>

<div class="container">

  <h1>Proxy Formatter</h1>

  <textarea id="input" placeholder="Paste proxy blocks here..."></textarea>

  <button class="generate" onclick="generate()">Generate</button>

  <div class="output" id="output"></div>

</div>

<script>
function generate() {
  const input = document.getElementById('input').value.trim();
  const output = document.getElementById('output');
  output.innerHTML = '';

  const blocks = input.split(/\n\s*\n/);

  blocks.forEach((block, index) => {
    const lines = block.split('\n');

    let host = '', port = '', user = '', pass = '';

    lines.forEach(line => {
      if (line.toLowerCase().includes('proxy server')) {
        host = line.split(':')[1]?.trim();
      }
      if (line.toLowerCase().startsWith('port')) {
        port = line.split(':')[1]?.trim();
      }
      if (line.toLowerCase().startsWith('username')) {
        user = line.split(':')[1]?.trim();
      }
      if (line.toLowerCase().startsWith('password')) {
        pass = line.split(':')[1]?.trim();
      }
    });

    if (host && port && user && pass) {
      const formatted = `${host}:${port}:${user}:${pass}`;

      const row = document.createElement('div');
      row.className = 'row';

      const proxyText = document.createElement('div');
      proxyText.className = 'proxy';
      proxyText.innerHTML = `
        ${index + 1}. 
        <span class="host">${host}</span>:
        <span class="port">${port}</span>:
        <span class="user">${user}</span>:
        <span class="pass">${pass}</span>
      `;

      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.textContent = 'Copy';

      copyBtn.onclick = () => {
        navigator.clipboard.writeText(formatted);
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy', 1000);
      };

      row.appendChild(proxyText);
      row.appendChild(copyBtn);
      output.appendChild(row);
    }
  });
}
</script>

</body>
</html>
