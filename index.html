<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tools Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="icon.png">

<style>

input { box-sizing: border-box; }
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#f8fafc;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#ffffff;
  border-right:1px solid #e5e7eb;
  padding:20px;
  height:100vh;
}

.sidebar h3{
  margin-bottom:20px;
  color:#374151;
}

.menu-item{
  padding:12px 14px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:8px;
  transition:.2s;
}

.menu-item:hover{
  background:#f3f4f6;
}

.menu-item.active{
  background:#84cc16;
  color:white;
}

/* MAIN */
.main{
  flex:1;
  padding:25px;
}

/* TOOL WRAPPER */
.tool{
  display:none;
  width:100%;
  height:100%;
}

.tool.active{
  display:block;
}

/* iframe */
iframe{
  width:100%;
  height:92vh;
  border:none;
  border-radius:14px;
  background:white;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<!-- ✅ LOGIN SCREEN -->
<div id="loginScreen" style="
  position:fixed;
  inset:0;
  background:#f8fafc;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
">

  <div style="
    background:white;
    padding:25px;
    border-radius:16px;
    border:1px solid #e5e7eb;
    width:300px;
    text-align:center;
  ">
    <h3>Login</h3>

    <input id="username" placeholder="Username" style="width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #e5e7eb;">
    <input id="password" type="password" placeholder="Password" style="width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #e5e7eb;">

    <button onclick="login()" style="width:100%;padding:12px;border-radius:20px;background:#84cc16;color:white;border:none;">Login</button>

    <div id="error" style="color:red;font-size:12px;margin-top:10px;"></div>
  </div>
</div>

<!-- ✅ WRAP YOUR APP -->
<div id="app" style="display:none; width:100%; display:flex;">

<div class="sidebar">
  <h3>Tools</h3>

  <div class="menu-item active" onclick="show('proxy',this)">Proxy Formatter</div>
  <div class="menu-item" onclick="show('auth',this)">2FA Generator</div>
  <div class="menu-item" onclick="show('phone',this)">Phone Generator</div>
  <div class="menu-item" onclick="show('paypal',this)">PayPal 4 Docs</div>
</div>

<div class="main">

  <div id="proxy" class="tool active">
    <iframe src="CashProxy.html"></iframe>
  </div>

  <div id="auth" class="tool">
    <iframe src="CashAuth.html"></iframe>
  </div>

  <div id="phone" class="tool">
    <iframe src="CashPhone.html"></iframe>
  </div>

  <div id="paypal" class="tool">
    <iframe src="4Docs.html"></iframe>
  </div>
</div>

</div>

<script>
function show(id,el){
  document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
  el.classList.add('active');
}

/* LOGIN */
const USER = "Agadir";
const PASS = "Agadir";

function login() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;

  if (u === USER && p === PASS) {
sessionStorage.setItem("loginTime", Date.now());
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "flex";
  } else {
    document.getElementById("error").textContent = "Wrong credentials";
  }
}

/* NO AUTO LOGIN */
setInterval(() => {
  const loginTime = sessionStorage.getItem("loginTime");

  if (!loginTime) return;

  const now = Date.now();
  const diff = now - loginTime;

  const limit = 15 * 60 * 1000; // 15 minutes

  if (diff > limit) {
    sessionStorage.clear();
    location.reload(); // force login again
  }
}, 5000); // check every 5s
</script>

</body>
</html>
