<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tools Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="icon.png">

<style>

* {
  transition: all 0.2s ease;
}

.footer {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: #6b7280;
}

/* MOBILE */
@media (max-width: 768px) {
  body {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    height: auto;
    display: flex;
    overflow-x: auto;
    gap: 8px;
    padding: 10px;
    scrollbar-width: none;
  }

  .sidebar::-webkit-scrollbar {
    display: none;
  }

  .menu-item {
    flex: 1;
    text-align: center;
    white-space: nowrap;
  }

  .main {
    padding: 10px;
  }

  iframe {
    height: 80vh;
  }
}

input { box-sizing: border-box; }

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#f8fafc;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#ffffff;
  border-right:1px solid #e5e7eb;
  padding:20px;
  height:100vh;
}

.sidebar h3{
  margin-bottom:20px;
  color:#374151;
}

.menu-item{
  padding:12px 14px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:8px;
}

.menu-item:hover{
  background:#f3f4f6;
}

.menu-item.active{
  background:#84cc16;
  color:white;
}

/* MAIN */
.main{
  flex:1;
  padding:25px;
}

/* TOOL */
.tool{
  display:none;
}

.tool.active{
  display:block;
}

/* iframe */
iframe{
  width:100%;
  height:92vh;
  border:none;
  border-radius:14px;
  background:white;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader" style="
position:fixed;
inset:0;
background:white;
display:flex;
align-items:center;
justify-content:center;
z-index:10000;">
Loading...
</div>

<!-- LOGIN -->
<div id="loginScreen" style="
position:fixed;
inset:0;
background:#f8fafc;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;">

  <div style="
    background:white;
    padding:25px;
    border-radius:16px;
    border:1px solid #e5e7eb;
    width:300px;
    text-align:center;">
    
    <h3>Login</h3>

    <input id="username" placeholder="Username" style="width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #e5e7eb;">
    <input id="password" type="password" placeholder="Password" style="width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #e5e7eb;">

    <button onclick="login()" style="width:100%;padding:12px;border-radius:20px;background:#84cc16;color:white;border:none;">Login</button>

    <div id="error" style="color:red;font-size:12px;margin-top:10px;"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none; width:100%; display:flex;">

<div class="sidebar">
  <h3>Tools</h3>

  <div class="menu-item active" onclick="show('proxy',this)">Proxy Formatter</div>
  <div class="menu-item" onclick="show('auth',this)">2FA Generator</div>
  <div class="menu-item" onclick="show('phone',this)">Phone Generator</div>
  <div class="menu-item" onclick="show('paypal',this)">PayPal 4 Docs</div>
</div>

<div class="main">

  <div id="proxy" class="tool active">
    <iframe src="CashProxy.html"></iframe>
  </div>

  <div id="auth" class="tool">
    <iframe src="CashAuth.html"></iframe>
  </div>

  <div id="phone" class="tool">
    <iframe src="CashPhone.html"></iframe>
  </div>

  <div id="paypal" class="tool">
    <iframe src="4Docs.html"></iframe>
  </div>

</div>

</div>

<div class="footer">
  Built by DraQing • © 2026 • All rights reserved
</div>

<script>

/* LOAD + RESTORE TOOL */
window.addEventListener("load", () => {
  document.getElementById("loader").style.display = "none";

  const last = localStorage.getItem("lastTool");
  if (last) {
    document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
    document.getElementById(last).classList.add("active");

    document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
    document.querySelector(`[onclick*="${last}"]`)?.classList.add("active");
  }
});

/* NAV */
function show(id,el){
  document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
  el.classList.add('active');

  localStorage.setItem("lastTool", id);
}

/* LOGIN */
const USER = "Agadir";
const PASS = "Agadir";

function login() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;

  if (u === USER && p === PASS) {
    sessionStorage.setItem("loginTime", Date.now());
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "flex";
  } else {
    document.getElementById("error").textContent = "Wrong credentials";
  }
}

/* AUTO LOGOUT */
setInterval(() => {
  const loginTime = sessionStorage.getItem("loginTime");
  if (!loginTime) return;

  if (Date.now() - loginTime > 15 * 60 * 1000) {
    sessionStorage.clear();
    location.reload();
  }
}, 5000);

</script>

</body>
</html>
