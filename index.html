<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tools Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="icon.png">

<style>
* { transition: all 0.25s ease; }

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#f8fafc;
  display:flex;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:240px;
  background:rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  border-right:1px solid #e5e7eb;
  padding:20px;
  height:100vh;
}
 
#app {
  opacity: 0;
}

#app.show {
  opacity: 1;
}
.menu-item{
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  margin-bottom:10px;
  display:flex;
  gap:8px;
}

.menu-item:hover{ background:#f3f4f6; }
.menu-item.active{ background:#84cc16; color:white; }

/* ===== MAIN ===== */
.main{ flex:1; padding:30px; }
.tool{ display:none; }
.tool.active{ display:block; }

iframe{
  width:100%;
  height:90vh;
  border:none;
  border-radius:16px;
  background:white;
  box-shadow:0 20px 40px rgba(0,0,0,0.05);
}

/* ===== LOGIN ===== */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#f8fafc,#e5e7eb);
  animation: fadeIn .5s;
}

.login-card{
  background:rgba(255,255,255,0.7);
  backdrop-filter: blur(20px);
  padding:30px;
  border-radius:20px;
  border:1px solid #e5e7eb;
  width:320px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.08);
  animation: scaleIn .4s;
}

@keyframes fadeIn{ from{opacity:0} to{opacity:1} }
@keyframes scaleIn{ from{transform:scale(.9);opacity:0} to{transform:scale(1);opacity:1} }

/* SHAKE */
.shake{ animation:shake .3s; }
@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  50%{transform:translateX(5px)}
  75%{transform:translateX(-5px)}
  100%{transform:translateX(0)}
}

input{
box-sizing: border-box; 
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:12px;
  border:1px solid #e5e7eb;
}

button{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  background:#84cc16;
  color:white;
  cursor:pointer;
}

/* SPINNER */
.spinner{
  width:16px;
  height:16px;
  border:2px solid white;
  border-top:2px solid transparent;
  border-radius:50%;
  display:inline-block;
  margin-left:8px;
  animation:spin .6s linear infinite;
}
@keyframes spin{ to{transform:rotate(360deg)} }

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  text-align:center;
  padding:10px;
  font-size:12px;
  background:rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
}

/* MOBILE */
@media(max-width:768px){
  body{flex-direction:column;}
  .sidebar{width:100%;display:flex;overflow-x:auto;}
  .menu-item{flex:1;justify-content:center;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <h2>Welcome</h2>

    <input id="username" placeholder="Username">

    <div style="position:relative;">
      <input id="password" type="password" placeholder="Password">
      <span onclick="togglePass()" style="
        position:absolute;
        right:12px;
        top:50%;
        transform:translateY(-50%);
        cursor:pointer;">👁</span>
    </div>

    <button id="loginBtn" onclick="login()">Login</button>
    <div id="error" style="color:red;font-size:12px;margin-top:10px;"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none; width:100%;">
  
<div class="sidebar">
  <div class="menu-item active" onclick="show('proxy',this)">📡 Proxy</div>
  <div class="menu-item" onclick="show('auth',this)">🔐 2FA</div>
  <div class="menu-item" onclick="show('phone',this)">📞 Phone</div>
  <div class="menu-item" onclick="show('paypal',this)">💳 PayPal</div>
</div>

<div class="main">
  <div id="proxy" class="tool active"><iframe src="CashProxy.html"></iframe></div>
  <div id="auth" class="tool"><iframe src="CashAuth.html"></iframe></div>
  <div id="phone" class="tool"><iframe src="CashPhone.html"></iframe></div>
  <div id="paypal" class="tool"><iframe src="4Docs.html"></iframe></div>
</div>

</div>

<div class="footer">Built by DraQing • © 2026</div>

<script>

document.getElementById("app").classList.add("show");
/* ENTER LOGIN */
document.addEventListener("keydown", e=>{
  if(e.key==="Enter") login();
});

/* PASSWORD TOGGLE */
function togglePass(){
  const p=document.getElementById("password");
  p.type=p.type==="password"?"text":"password";
}

/* NAV */
function show(id,el){
  document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
  el.classList.add('active');
}

/* LOAD USERNAME */
window.addEventListener("load",()=>{
  const saved=localStorage.getItem("lastUser");
  if(saved) username.value=saved;
});

/* LOGIN */
const USER="Agadir", PASS="Agadir";

function login(){
  const u=username.value, p=password.value;
  const btn=document.getElementById("loginBtn");
  const card=document.querySelector(".login-card");

  if(u!==USER||p!==PASS){
    error.textContent="Wrong credentials";
    card.classList.add("shake");
    setTimeout(()=>card.classList.remove("shake"),300);
    return;
  }

  localStorage.setItem("lastUser",u);

  btn.innerHTML="Logging in...";
  btn.disabled=true;

  const sp=document.createElement("span");
  sp.className="spinner";
  btn.appendChild(sp);

  setTimeout(()=>{
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("app").style.display="flex";
  },1500);
}
</script>

</body>
</html>
