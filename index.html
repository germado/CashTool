<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon.png">
<title>CashTool Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:Inter;margin:0;transition:.25s}
body{background:#f8fafc;display:flex}

/* SIDEBAR */
.sidebar{
  width:240px;background:#fff;border-right:1px solid #eee;
  padding:20px;height:100vh;
}
.menu-item{
  padding:12px;border-radius:12px;cursor:pointer;margin-bottom:10px;
}
.menu-item.active{background:#84cc16;color:#fff}
.menu-item:hover{background:#f3f4f6}

/* MAIN */
.main{flex:1;padding:30px}
.tool{display:none}
.tool.active{display:block}
iframe{width:100%;height:90vh;border:none;border-radius:16px}

/* LOGIN */
#loginScreen{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#f8fafc,#e5e7eb);
}
.login-card{
  width:340px;background:#fff;padding:30px;border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.08);
}

/* TABS */
.tabs{
  display:flex;margin-bottom:20px;background:#f1f5f9;border-radius:12px;
}
.tab{
  flex:1;text-align:center;padding:10px;border-radius:12px;cursor:pointer;
}
.tab.active{background:#84cc16;color:#fff}

/* INPUT */
input{
  width:100%;padding:14px;margin-bottom:12px;
  border-radius:12px;border:1px solid #e5e7eb;
}
input:focus{
  border-color:#84cc16;
  box-shadow:0 0 0 2px rgba(132,204,22,.2);
}

/* BUTTON */
button{
  width:100%;padding:14px;border-radius:30px;border:none;
  background:#84cc16;color:#fff;font-weight:500;cursor:pointer;
}

/* FOOTER */
.footer{
  position:fixed;bottom:0;width:100%;
  text-align:center;padding:10px;font-size:12px;color:#555;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">

    <div class="tabs">
      <div class="tab active" onclick="setMode('login')" id="tabLogin">Login</div>
      <div class="tab" onclick="setMode('register')" id="tabRegister">Register</div>
    </div>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="actionBtn">Login</button>

    <div onclick="resetPassword()" style="cursor:pointer;font-size:13px;color:#84cc16;text-align:center">
      Forgot password?
    </div>

    <div id="error" style="color:red;font-size:12px;margin-top:8px;"></div>

  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;width:100%;flex-direction:row">

  <div class="sidebar">
    <div class="menu-item active" onclick="show('proxy',this)">Proxy</div>
    <div class="menu-item" onclick="show('auth',this)">2FA</div>
    <div class="menu-item" onclick="show('phone',this)">Phone</div>
    <div class="menu-item" onclick="show('paypal',this)">PayPal</div>
    <div class="menu-item" onclick="logout()">Logout</div>
  </div>

  <div class="main">
    <div id="proxy" class="tool active"><iframe src="CashProxy.html"></iframe></div>
    <div id="auth" class="tool"><iframe src="CashAuth.html"></iframe></div>
    <div id="phone" class="tool"><iframe src="CashPhone.html"></iframe></div>
    <div id="paypal" class="tool"><iframe src="4Docs.html"></iframe></div>
  </div>

</div>

<div class="footer">Built by DraQing • © 2026</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  sendPasswordResetEmail,
  sendEmailVerification,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAx4ll0Pb51oWxrroGSk-odIVzBq3zpJI4",
  authDomain: "cashtool-e5fbf.firebaseapp.com",
  projectId: "cashtool-e5fbf",
  appId: "1:453853626540:web:d8bb5eb9bf31b3e2cfdf09"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);

let mode = "login";

/* EMAIL FILTER */
function isValidEmail(email) {
  return /@(gmail\.com|outlook\.com|hotmail\.com|cashtool\.com|outlook\.fr|outlook\.de|hotmail\.fr)$/i.test(email);
}

/* MODE SWITCH */
window.setMode = function(m){
  mode = m;
  tabLogin.classList.toggle("active", m==="login");
  tabRegister.classList.toggle("active", m==="register");
  actionBtn.textContent = m==="login" ? "Login" : "Create Account";
};

/* ACTION BUTTON */
actionBtn.onclick = () => {
  const emailVal = email.value;
  const passVal = password.value;

  if (!isValidEmail(emailVal)) {
    error.textContent = "Only Gmail, Outlook, Hotmail allowed";
    return;
  }

  if(mode==="login"){
    signInWithEmailAndPassword(auth,emailVal,passVal)
      .then(userCred => {
        if (!userCred.user.emailVerified) {
          error.textContent = "Please verify your email first";
          signOut(auth);
        }
      })
      .catch(e=>error.textContent=e.message);
  } else {
    createUserWithEmailAndPassword(auth,emailVal,passVal)
      .then(userCred => {
        sendEmailVerification(userCred.user);
        alert("Verification email sent. Check your inbox.");
      })
      .catch(e=>error.textContent=e.message);
  }
};

/* RESET PASSWORD */
window.resetPassword = function(){
  sendPasswordResetEmail(auth,email.value)
    .then(()=>alert("Reset email sent"))
    .catch(e=>error.textContent=e.message);
};

/* AUTO LOGIN */
onAuthStateChanged(auth,user=>{
  if(user && user.emailVerified){
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("app").style.display="flex";
  }
});

/* LOGOUT */
window.logout = function(){
  signOut(auth).then(()=>location.reload());
};

</script>

<script>
function show(id,el){
  document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
  el.classList.add('active');
}
</script>

</body>
</html>
