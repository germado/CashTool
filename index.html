<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tools Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="icon.png">
<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#f8fafc;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#ffffff;
  border-right:1px solid #e5e7eb;
  padding:20px;
  height:100vh;
}

.sidebar h3{
  margin-bottom:20px;
  color:#374151;
}

.menu-item{
  padding:12px 14px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:8px;
  transition:.2s;
}

.menu-item:hover{
  background:#f3f4f6;
}

.menu-item.active{
  background:#84cc16;
  color:white;
}

/* MAIN */
.main{
  flex:1;
  padding:25px;
}

/* TOOL WRAPPER */
.tool{
  display:none;
  width:100%;
  height:100%;
}

.tool.active{
  display:block;
}

/* iframe (safe isolation) */
iframe{
  width:100%;
  height:92vh;
  border:none;
  border-radius:14px;
  background:white;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>Tools</h3>

  <div class="menu-item active" onclick="show('proxy',this)">Proxy Formatter</div>
  <div class="menu-item" onclick="show('auth',this)">2FA Generator</div>
  <div class="menu-item" onclick="show('phone',this)">Phone Generator</div>
  <div class="menu-item" onclick="show('paypal',this)">PayPal 4 Docs</div>
</div>

<div class="main">

  <div id="proxy" class="tool active">
    <iframe src="CashProxy.html"></iframe>
  </div>

  <div id="auth" class="tool">
    <iframe src="CashAuth.html"></iframe>
  </div>

  <div id="phone" class="tool">
    <iframe src="CashPhone.html"></iframe>
  </div>

  <div id="paypal" class="tool">
    <iframe src="4Docs.html"></iframe>
  </div>
</div>

<script>
function show(id,el){
  document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
  el.classList.add('active');
}
</script>

</body>
</html>
